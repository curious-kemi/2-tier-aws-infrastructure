

repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0 
    hooks:
      - id: detect-secrets

  - repo: https://github.com/bridgecrewio/checkov
    rev: v3.2.510
    hooks:
      - id: checkov
        entry: checkov -d .

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_tflint
        args:
        - --args=--config=terraform/.tflint.hcl
      - id: terraform_fmt
     
        