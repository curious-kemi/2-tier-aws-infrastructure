---
# tasks file for app
- name: Install Tomcat
  ansible.builtin.yum:
    name: tomcat
    state: present

- name: Start and enable Tomcat
  ansible.builtin.service:
    name: tomcat
    state: started
    enabled: true

- name: Fetch and parse secret
  ansible.builtin.set_fact:
    db_creds: "{{ lookup('amazon.aws.secretsmanager_secret', 'db_credentials') | from_json }}"
  no_log: true

- name: Create environment file
  ansible.builtin.template:
    src: setenv.sh.j2
    dest: /opt/tomcat/bin/setenv.sh
    mode: 0600

- name: Copy the war file from jenkins to tomcat
  ansible.builtin.copy:
    src: "{{war_file}}"
    dest: /usr/share/tomcat/webapps/VotingApp.war
  
- name: Restart Tomcat
  ansible.builtin.service:
    name: tomcat
    state: restarted
    enabled: true
    